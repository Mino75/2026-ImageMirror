name: Mirror Docker Images

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Mirror images
        shell: bash
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKER_USERNAME }}
        run: |
          set -Eeuo pipefail

          images_file="${GITHUB_WORKSPACE}/images.txt"

          if [[ ! -f "${images_file}" ]]; then
            echo "::error::images.txt not found"
            exit 1
          fi

          if [[ -z "${DOCKERHUB_USERNAME}" ]]; then
            echo "::error::DOCKER_USERNAME is empty"
            exit 1
          fi

          docker buildx version

          mirrored=0
          failed=0

          while IFS= read -r image || [[ -n "${image}" ]]; do
            image="${image%$'\r'}"

            # Trim leading whitespace
            image="${image#"${image%%[![:space:]]*}"}"

            # Trim trailing whitespace
            image="${image%"${image##*[![:space:]]}"}"

            # Skip empty lines and comments
            [[ -z "${image}" || "${image}" == \#* ]] && continue

            first_component="${image%%/*}"

            # Resolve source registry and repository path
            if [[ "${image}" != */* ]]; then
              registry="docker.io"
              source="docker.io/library/${image}"
              repository_reference="library/${image}"

            elif [[ "${first_component}" == *.* ||
                    "${first_component}" == *:* ||
                    "${first_component}" == "localhost" ]]; then
              registry="${first_component}"
              source="${image}"
              repository_reference="${image#*/}"

            else
              registry="docker.io"
              source="docker.io/${image}"
              repository_reference="${image}"
            fi

            # Extract repository and tag
            tag="latest"

            if [[ "${repository_reference}" == *@* ]]; then
              repository="${repository_reference%%@*}"
              digest="${repository_reference#*@}"
              digest_value="${digest#sha256:}"
              tag="digest-${digest_value:0:12}"

            elif [[ "${repository_reference##*/}" == *:* ]]; then
              repository="${repository_reference%:*}"
              tag="${repository_reference##*:}"

            else
              repository="${repository_reference}"
            fi

            # Encode registry and full repository path into one Docker Hub
            # repository name because Docker Hub supports one namespace level.
            destination_repository="${registry}--${repository}"
            destination_repository="${destination_repository//\//--}"
            destination_repository="${destination_repository,,}"

            # Replace unsupported characters
            destination_repository="$(
              printf '%s' "${destination_repository}" |
                sed -E \
                  -e 's/[^a-z0-9._-]+/-/g' \
                  -e 's/-{3,}/--/g' \
                  -e 's/^[._-]+//' \
                  -e 's/[._-]+$//'
            )"

            if [[ -z "${destination_repository}" ]]; then
              echo "::error::Invalid destination generated for ${source}"
              ((failed += 1))
              continue
            fi

            destination="docker.io/${DOCKERHUB_USERNAME}/${destination_repository}:${tag}"

            echo
            echo "Source      : ${source}"
            echo "Destination : ${destination}"

            if docker buildx imagetools create \
              --tag "${destination}" \
              "${source}"; then

              docker buildx imagetools inspect "${destination}"
              ((mirrored += 1))
            else
              echo "::error::Failed to mirror ${source}"
              ((failed += 1))
            fi

          done < "${images_file}"

          echo
          echo "Mirrored: ${mirrored}"
          echo "Failed:   ${failed}"

          if (( failed > 0 )); then
            exit 1
          fi
