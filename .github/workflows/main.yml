name: Mirror Docker Images

on:
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Install crane
        uses: imjasonh/setup-crane@v0.4

      - name: Mirror images
        shell: bash
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKER_USERNAME }}
        run: |
          set -euo pipefail

          IMAGES_FILE="${GITHUB_WORKSPACE}/images.txt"

          if [[ ! -f "${IMAGES_FILE}" ]]; then
            echo "::error::images.txt was not found at the repository root"
            exit 1
          fi

          while IFS= read -r image || [[ -n "${image}" ]]; do
            # Remove Windows carriage returns
            image="${image%$'\r'}"

            # Remove leading and trailing spaces
            image="$(echo "${image}" | xargs)"

            # Skip empty lines and comments
            [[ -z "${image}" || "${image}" == \#* ]] && continue

            # Official Docker Hub images use the implicit "library" namespace
            if [[ "${image}" == */* ]]; then
              source="docker.io/${image}"
            else
              source="docker.io/library/${image}"
            fi

            # Keep only the repository name and tag for the destination
            repository_and_tag="${image##*/}"
            destination="docker.io/${DOCKERHUB_USERNAME}/${repository_and_tag}"

            echo "Copying ${source} -> ${destination}"

            crane copy \
              "${source}" \
              "${destination}"
          done < "${IMAGES_FILE}"
