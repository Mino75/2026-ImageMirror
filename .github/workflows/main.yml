name: Mirror Docker Images

on:
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Install crane
        uses: imjasonh/setup-crane@v0.4

      - name: Mirror images
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKER_USERNAME }}
        run: |
          set -euo pipefail

          test -f "$GITHUB_WORKSPACE/images.txt" || {
            echo "::error::images.txt was not found at the repository root"
            exit 1
          }

          while IFS= read -r image || [[ -n "$image" ]]; do
            image="${image%$'\r'}"

            [[ -z "$image" || "$image" == \#* ]] && continue

            destination="docker.io/${DOCKERHUB_USERNAME}/${image#*/}"

            echo "Copying docker.io/${image} -> ${destination}"

            crane copy \
              "docker.io/${image}" \
              "${destination}"
          done < "$GITHUB_WORKSPACE/images.txt"
