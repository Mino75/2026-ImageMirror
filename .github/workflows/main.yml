name: Mirror Docker Images

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Mirror images
        shell: bash
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKER_USERNAME }}
        run: |
          set -Eeuo pipefail

          images_file="${GITHUB_WORKSPACE}/images.txt"

          if [[ ! -f "${images_file}" ]]; then
            echo "::error::images.txt not found"
            exit 1
          fi

          if [[ -z "${DOCKERHUB_USERNAME}" ]]; then
            echo "::error::DOCKER_USERNAME is empty"
            exit 1
          fi

          docker buildx version

          updated=0
          skipped=0
          failed=0

          #
          # Run a command again when Docker Hub returns HTTP 429.
          #
          retry_on_rate_limit() {
            local max_attempts=5
            local attempt=1
            local delay=15
            local output_file
            local status

            output_file="$(mktemp)"

            while true; do
              if "$@" 2>"${output_file}"; then
                rm -f "${output_file}"
                return 0
              else
                status=$?
              fi

              cat "${output_file}" >&2

              if ! grep -qE '429|Too Many Requests' "${output_file}"; then
                rm -f "${output_file}"
                return "${status}"
              fi

              if (( attempt >= max_attempts )); then
                echo "::error::Command failed after ${max_attempts} attempts: $*" >&2
                rm -f "${output_file}"
                return "${status}"
              fi

              echo "::warning::Docker Hub rate limit encountered. Retrying in ${delay} seconds..." >&2

              sleep "${delay}"

              attempt=$((attempt + 1))
              delay=$((delay * 2))

              : > "${output_file}"
            done
          }

          #
          # Return the top-level manifest digest.
          #
          inspect_digest() {
            docker buildx imagetools inspect \
              "$1" \
              --format '{{.Manifest.Digest}}'
          }

          #
          # Copy a multi-platform image to Docker Hub.
          #
          copy_image() {
            docker buildx imagetools create \
              --tag "$2" \
              "$1"
          }

          while IFS= read -r image || [[ -n "${image}" ]]; do
            image="${image%$'\r'}"

            # Trim leading and trailing whitespace.
            image="${image#"${image%%[![:space:]]*}"}"
            image="${image%"${image##*[![:space:]]}"}"

            # Skip blank lines and comments.
            [[ -z "${image}" || "${image}" == \#* ]] && continue

            first_component="${image%%/*}"

            #
            # Resolve the source registry.
            #
            if [[ "${image}" != */* ]]; then
              registry="docker.io"
              source="docker.io/library/${image}"
              repository_reference="library/${image}"

            elif [[ "${first_component}" == *.* ||
                    "${first_component}" == *:* ||
                    "${first_component}" == "localhost" ]]; then
              registry="${first_component}"
              source="${image}"
              repository_reference="${image#*/}"

            else
              registry="docker.io"
              source="docker.io/${image}"
              repository_reference="${image}"
            fi

            #
            # Extract the repository and tag.
            #
            tag="latest"

            if [[ "${repository_reference}" == *@* ]]; then
              repository="${repository_reference%%@*}"
              digest="${repository_reference#*@}"
              digest_value="${digest#sha256:}"
              tag="digest-${digest_value:0:12}"

            elif [[ "${repository_reference##*/}" == *:* ]]; then
              repository="${repository_reference%:*}"
              tag="${repository_reference##*:}"

            else
              repository="${repository_reference}"
            fi

            #
            # Encode the registry and full repository path into a valid
            # Docker Hub repository name.
            #
            destination_repository="${registry}--${repository}"
            destination_repository="${destination_repository//\//--}"
            destination_repository="${destination_repository,,}"

            destination="docker.io/${DOCKERHUB_USERNAME}/${destination_repository}:${tag}"

            echo
            echo "Source      : ${source}"
            echo "Destination : ${destination}"

            #
            # Read the source digest.
            #
            if ! source_digest="$(
              retry_on_rate_limit inspect_digest "${source}"
            )"; then
              echo "::error::Unable to inspect source image ${source}"
              failed=$((failed + 1))
              sleep 10
              continue
            fi

            #
            # Read the destination digest.
            #
            # Failure is allowed because the destination may not exist yet.
            # A 429 response is retried before treating the destination as absent.
            #
            destination_digest="$(
              retry_on_rate_limit inspect_digest "${destination}" \
                2>/dev/null || true
            )"

            echo "Source digest      : ${source_digest}"
            echo "Destination digest : ${destination_digest:-not found}"

            #
            # Skip the copy when the complete multi-platform manifest
            # already matches.
            #
            if [[ -n "${destination_digest}" &&
                  "${source_digest}" == "${destination_digest}" ]]; then
              echo "Already up to date. Skipping."
              skipped=$((skipped + 1))

              sleep 5
              continue
            fi

            echo "Source changed or destination does not exist."
            echo "Updating image..."

            #
            # Copy the image and retry if Docker Hub returns HTTP 429.
            #
            if retry_on_rate_limit \
              copy_image "${source}" "${destination}"; then
              echo "Updated: ${destination}"
              updated=$((updated + 1))
            else
              echo "::error::Failed to mirror ${source}"
              failed=$((failed + 1))
            fi

            #
            # Avoid sending a large burst of requests when processing
            # consecutive multi-platform images.
            #
            sleep 10

          done < "${images_file}"

          echo
          echo "Updated: ${updated}"
          echo "Skipped: ${skipped}"
          echo "Failed:  ${failed}"

          if (( failed > 0 )); then
            exit 1
          fi
