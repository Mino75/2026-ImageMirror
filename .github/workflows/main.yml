name: Mirror Docker Images

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Mirror images
        shell: bash
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKER_USERNAME }}
        run: |
          set -euo pipefail

          images_file="${GITHUB_WORKSPACE}/images.txt"

          if [[ ! -f "${images_file}" ]]; then
            echo "::error::images.txt was not found at the repository root"
            exit 1
          fi

          docker buildx version

          while IFS= read -r image || [[ -n "${image}" ]]; do
            image="${image%$'\r'}"

            # delete spaces
            image="${image#"${image%%[![:space:]]*}"}"
            image="${image%"${image##*[![:space:]]}"}"

            [[ -z "${image}" || "${image}" == \#* ]] && continue

            if [[ "${image}" == */* ]]; then
              source="docker.io/${image}"
            else
              source="docker.io/library/${image}"
            fi

            repository_and_tag="${image##*/}"
            destination="docker.io/${DOCKERHUB_USERNAME}/${repository_and_tag}"

            echo "Copying ${source} -> ${destination}"

            docker buildx imagetools create \
              --tag "${destination}" \
              "${source}"

            docker buildx imagetools inspect "${destination}"
          done < "${images_file}"
