name: Mirror Docker Images

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Mirror images
        shell: bash
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKER_USERNAME }}
        run: |
          set -Eeuo pipefail

          images_file="${GITHUB_WORKSPACE}/images.txt"

          if [[ ! -f "${images_file}" ]]; then
            echo "::error::images.txt not found"
            exit 1
          fi

          docker buildx version

          mirrored=0
          failed=0

          while IFS= read -r image || [[ -n "$image" ]]; do
            image="${image%$'\r'}"

            # Trim whitespace
            image="${image#"${image%%[![:space:]]*}"}"
            image="${image%"${image##*[![:space:]]}"}"

            # Skip comments and blank lines
            [[ -z "$image" || "$image" == \#* ]] && continue

            first="${image%%/*}"

            #
            # Resolve source image
            #
            if [[ "$image" != */* ]]; then
              # nginx:latest
              registry="docker.io"
              source="docker.io/library/${image}"
              repo_path="library/${image}"

            elif [[ "$first" == *.* || "$first" == *:* || "$first" == "localhost" ]]; then
              # ghcr.io/org/image:tag
              # quay.io/org/image:tag
              # registry.k8s.io/image:tag
              registry="$first"
              source="$image"
              repo_path="${image#*/}"

            else
              # bitnami/wordpress:latest
              registry="docker.io"
              source="docker.io/${image}"
              repo_path="$image"
            fi

            #
            # Split repository and tag
            #
            tag="latest"

            if [[ "$repo_path" == *@* ]]; then
              repository="${repo_path%%@*}"
              digest="${repo_path#*@}"
              tag="sha256-${digest#sha256:}"
              tag="${tag:0:20}"
            elif [[ "${repo_path##*/}" == *:* ]]; then
              tag="${repo_path##*:}"
              repository="${repo_path%:*}"
            else
              repository="$repo_path"
            fi

            #
            # Preserve provider + full repository path
            #
            destination_repo="${registry}--${repository}"
            destination_repo="${destination_repo//\//--}"
            destination_repo="${destination_repo,,}"

            destination="docker.io/${DOCKERHUB_USERNAME}/${destination_repo}:${tag}"

            echo
            echo "Source      : ${source}"
            echo "Destination : ${destination}"

            if docker buildx imagetools create \
                --tag "${destination}" \
                "${source}"; then

              docker buildx imagetools inspect "${destination}"
              ((mirrored++))
            else
              echo "::error::Failed: ${source}"
              ((failed++))
            fi

          done < "${images_file}"

          echo
          echo "Mirrored: ${mirrored}"
          echo "Failed  : ${failed}"

          if (( failed > 0 )); then
            exit 1
          fi
